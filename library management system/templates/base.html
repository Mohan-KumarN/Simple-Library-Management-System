<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTU - Library Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-slate-700 p-4 text-white shadow-xl">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold"><i class="fas fa-book-reader mr-2"></i> LMS Dashboard</h1>
            <div class="space-x-4">
                <a href="/" class="hover:text-blue-300 transition-colors">Dashboard</a>
                <a href="/books" class="hover:text-blue-300 transition-colors">Books</a>
                <a href="/members" class="hover:text-blue-300 transition-colors">Members</a>
                <a href="/issue" class="bg-blue-500 text-white px-4 py-2 rounded-lg font-semibold hover:bg-blue-600 transition-colors">
                    <i class="fas fa-hand-holding"></i> Issue Book
                </a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-6">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
