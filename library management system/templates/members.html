{% extends 'base.html' %}

{% block content %}
<h2 class="text-3xl font-bold text-gray-800 mb-6">Member Records Management</h2>

<div class="bg-white p-6 rounded-xl shadow-lg mb-8">
    <h3 class="text-xl font-semibold mb-4 text-green-600"><i class="fas fa-user-plus mr-2"></i> Register New Member</h3>
    <form method="POST" class="flex gap-4">
        <input type="text" name="name" placeholder="Student Name" required class="border border-gray-300 p-3 rounded-lg w-full focus:ring-green-500 focus:border-green-500">
        <input type="email" name="email" placeholder="Email Address" required class="border border-gray-300 p-3 rounded-lg w-full focus:ring-green-500 focus:border-green-500">
        <button type="submit" class="bg-blue-500 text-white px-8 py-3 rounded-lg font-semibold hover:bg-blue-600 transition-colors shadow-md">Register</button>
    </form>
</div>

<div class="bg-white rounded-xl shadow-lg overflow-hidden">
    <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-100">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
            </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
            {% for member in members %}
            <tr class="hover:bg-gray-50 transition-colors">
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{ member.member_id }}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">{{ member.name }}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ member.email }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
