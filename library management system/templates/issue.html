{% extends 'base.html' %}

{% block content %}
<div class="max-w-xl mx-auto bg-white p-8 rounded-xl shadow-2xl border-t-4 border-red-500">
    <h2 class="text-3xl font-bold text-gray-800 mb-6 text-center">
        <i class="fas fa-exchange-alt mr-2 text-red-500"></i> Efficient Book Issuance
    </h2>
    <p class="text-center text-gray-600 mb-8">Select a member and an available book to complete the transaction.</p>

    <form method="POST" class="space-y-6">
        <div>
            <label class="block text-lg font-medium text-gray-700 mb-2" for="member_id">Select Member</label>
            <select name="member_id" id="member_id" class="w-full border border-gray-300 p-3 rounded-lg bg-gray-50 focus:ring-blue-500 focus:border-blue-500">
                {% for member in members %}
                <option value="{{ member.member_id }}">{{ member.name }} (ID: {{ member.member_id }})</option>
                {% endfor %}
            </select>
        </div>
        
        <div>
            <label class="block text-lg font-medium text-gray-700 mb-2" for="book_id">Select Book (Available)</label>
            {% if books %}
            <select name="book_id" id="book_id" class="w-full border border-gray-300 p-3 rounded-lg bg-gray-50 focus:ring-blue-500 focus:border-blue-500">
                {% for book in books %}
                <option value="{{ book.book_id }}">{{ book.title }} by {{ book.author }}</option>
                {% endfor %}
            </select>
            {% else %}
            <p class="text-red-500 bg-red-50 p-3 rounded-lg border border-red-200">No books are currently available to issue.</p>
            {% endif %}
        </div>
        
        {% if books %}
        <button type="submit" class="w-full bg-red-600 text-white p-3 rounded-lg font-extrabold text-lg hover:bg-red-700 transition-colors shadow-xl">
            <i class="fas fa-arrow-right mr-2"></i> Issue Now
        </button>
        {% endif %}
    </form>
</div>
{% endblock %}
